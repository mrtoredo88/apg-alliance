<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Авторизация ВКонтакте — АПГ</title>
  <style>
    body { margin: 0; background: #0F0F1A; display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; gap: 12px; font-family: -apple-system, sans-serif; }
    p { color: #C9A84C; font-size: 15px; font-weight: 600; margin: 0; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #C9A84C; display: inline-block; animation: blink 1.2s ease-in-out infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }
  </style>
</head>
<body>
  <p>Входим через ВКонтакте</p>
  <div><span class="dot"></span>&nbsp;<span class="dot"></span>&nbsp;<span class="dot"></span></div>
  <script>
    var hash = window.location.hash.substring(1);
    var params = new URLSearchParams(hash);
    var data = {
      type: 'vk_auth_callback',
      access_token: params.get('access_token'),
      user_id: params.get('user_id'),
      error: params.get('error') || params.get('error_description'),
    };
    if (window.opener) {
      try { window.opener.postMessage(data, window.location.origin); } catch(e) {}
      setTimeout(function(){ window.close(); }, 300);
    } else {
      document.body.innerHTML = '<p style="color:#E64646;text-align:center;font-family:sans-serif;padding:24px">Закройте это окно и вернитесь в приложение</p>';
    }
  </script>
</body>
</html>
