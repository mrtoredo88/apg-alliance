<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>АПГ — Альянс Партнёров Города</title>
    <meta name="description" content="Программа лояльности для жителей Зеленограда — открывай местный бизнес, копи ключи, получай награды" />


    <!-- Preload LCP image -->
    <link rel="preload" href="/logo.webp" as="image" type="image/webp" />

    <!-- Preload key fonts to eliminate FOUT -->
    <link rel="preload" href="/fonts/manrope/manrope-400.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/manrope/manrope-600.woff2" as="font" type="font/woff2" crossorigin />

    <!-- Preconnect к Firebase для ускорения первого запроса -->
    <link rel="preconnect" href="https://firestore.googleapis.com" />
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#ECEEF2" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="АПГ" />
    <style>html,body{background:#ECEEF2;margin:0;padding:0;}</style>
    <link rel="apple-touch-icon" sizes="180x180" href="/180.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/16.png" />
  </head>
  <body>
    <script>try{var t=localStorage.getItem('apg_theme')||'light';document.documentElement.setAttribute('data-theme',t);}catch(e){document.documentElement.setAttribute('data-theme','light');}</script>
    <div id="root" role="main"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
